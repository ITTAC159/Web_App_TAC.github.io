<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai auto conversion co.ltd | ศูนย์รวมข้อมูลสำหรับพนักงาน</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        corporate: {
                            light: '#475569',   // สีเทาอ่อน (slate-600)
                            DEFAULT: '#1e293b', // สีเมนูหลัก (slate-800)
                            dark: '#0f172a',    // สีหัวเมนู (slate-900)
                            blue: '#1e3a8a',    // สีน้ำเงินองค์กร (blue-900)
                            red: '#dc2626',     // สีแดง (red-600)
                        }
                    },
                    fontFamily: {
                        sans: ['Sarabun', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts (Sarabun for Thai) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="text-slate-800 h-screen overflow-hidden flex">

    <!-- แถบด้านบนสำหรับมือถือ (Mobile Header) -->
    <div
        class="lg:hidden fixed top-0 left-0 right-0 h-16 bg-corporate-blue text-white z-40 flex items-center justify-between px-4 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 overflow-hidden rounded-lg bg-white">
                <img src="TAC-LOGO.png" alt="Company Logo" class="w-full h-full object-contain">
            </div>

            <h1 id="mobileLogoBtn" class="text-lg font-bold cursor-pointer text-corporate-red">Thai auto conversion co.
                ltd</h1>
        </div>
    </div>



    <!-- ส่วนเนื้อหาหลัก (Main Content Area) -->
    <main class="flex-1 h-full flex flex-col pt-16 lg:pt-0 overflow-y-auto relative">

        <!-- แถบด้านบนของเนื้อหา (Desktop Header) -->
        <header
            class="h-20 bg-white shadow-sm hidden lg:flex items-center justify-between px-8 z-10 shrink-0 sticky top-0">
            <div class="flex items-center gap-6">
                <div id="logoBtn"
                    class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity border-r border-slate-200 pr-6">
                    <div class="w-10 h-10 overflow-hidden rounded-lg">
                        <img src="TAC-LOGO.png" alt="Company Logo" class="w-full h-full object-contain">

                    </div>
                    <span class="text-xl font-bold text-corporate-red tracking-tight">Thai auto conversion co.
                        ltd</span>
                </div>
                <div>
                    <h2 id="headerTitle" class="text-xl font-bold text-slate-800">Welcome</h2>
                    <p id="headerSubtitle" class="text-sm text-slate-500 mt-0.5">
                        to the employee information center.</p>
                </div>
            </div>
        </header>

        <!-- พื้นที่แสดงเนื้อหาด้านใน -->
        <div class="p-4 md:p-8 flex-1 w-full max-w-6xl mx-auto pb-12">

            <!-- หัวข้อเนื้อหา สำหรับ Mobile -->
            <div class="lg:hidden mb-6">
                <h2 id="mobileHeaderTitle" class="text-2xl font-bold text-corporate-blue">Welcome</h2>
                <p id="mobileHeaderSubtitle" class="text-sm text-slate-500 mt-1">
                    to the employee information center.</p>
            </div>

            <!-- กล่องคอนเทนต์ที่จะถูกอัปเดต -->
            <div id="contentContainer" class="space-y-6 animate-fade-in">
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
