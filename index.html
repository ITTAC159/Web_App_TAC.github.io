<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal | ศูนย์รวมข้อมูลสำหรับพนักงาน</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        corporate: {
                            light: '#475569',   // สีเทาอ่อน (slate-600)
                            DEFAULT: '#1e293b', // สีเมนูหลัก (slate-800)
                            dark: '#0f172a',    // สีหัวเมนู (slate-900)
                            blue: '#1e3a8a',    // สีน้ำเงินองค์กร (blue-900)
                        }
                    },
                    fontFamily: {
                        sans: ['Sarabun', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Sarabun for Thai) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 h-screen overflow-hidden flex">

    <!-- แถบด้านบนสำหรับมือถือ (Mobile Header) -->
    <div class="lg:hidden fixed top-0 left-0 right-0 h-16 bg-corporate-blue text-white z-40 flex items-center justify-between px-4 shadow-md">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-layer-group text-blue-200 text-xl"></i>
            <h1 id="mobileLogoBtn" class="text-lg font-bold cursor-pointer">Employee Portal</h1>
        </div>
        <i class="fa-solid fa-circle-user text-2xl text-blue-200"></i>
    </div>



    <!-- ส่วนเนื้อหาหลัก (Main Content Area) -->
    <main class="flex-1 h-full flex flex-col pt-16 lg:pt-0 overflow-y-auto relative">
        
        <!-- แถบด้านบนของเนื้อหา (Desktop Header) -->
        <header class="h-20 bg-white shadow-sm hidden lg:flex items-center justify-between px-8 z-10 shrink-0 sticky top-0">
            <div class="flex items-center gap-6">
                <div id="logoBtn" class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity border-r border-slate-200 pr-6">
                    <div class="w-10 h-10 bg-corporate-blue rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-layer-group text-white text-lg"></i>
                    </div>
                    <span class="text-xl font-bold text-corporate-blue tracking-tight">Employee Portal</span>
                </div>
                <div>
                    <h2 id="headerTitle" class="text-xl font-bold text-slate-800">หน้าแรก (Home)</h2>
                    <p id="headerSubtitle" class="text-sm text-slate-500 mt-0.5">ยินดีต้อนรับสู่ศูนย์รวมข้อมูลสำหรับพนักงาน</p>
                </div>
            </div>
            <div class="flex items-center gap-4 bg-slate-50 py-2 px-4 rounded-full border border-slate-100">
                <div class="text-right">
                </div>
                <div class="w-10 h-10 rounded-full bg-corporate-blue flex items-center justify-center text-white shadow-sm">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </header>

        <!-- พื้นที่แสดงเนื้อหาด้านใน -->
        <div class="p-4 md:p-8 flex-1 w-full max-w-6xl mx-auto pb-12">
            
            <!-- หัวข้อเนื้อหา สำหรับ Mobile -->
            <div class="lg:hidden mb-6">
                <h2 id="mobileHeaderTitle" class="text-2xl font-bold text-corporate-blue">หน้าแรก (Home)</h2>
                <p id="mobileHeaderSubtitle" class="text-sm text-slate-500 mt-1">ยินดีต้อนรับสู่ศูนย์รวมข้อมูลสำหรับพนักงาน</p>
            </div>

            <!-- กล่องคอนเทนต์ที่จะถูกอัปเดต -->
            <div id="contentContainer" class="space-y-6 animate-fade-in">
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
